{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Site{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'dashboard/css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <div class="navbar-left">
            <a href="/" class="logo-text">
                <span class="logo-osu">osu!</span><span class="logo-journey">journey</span>
            </a>
            <div class="nav-divider"></div>
            <a href="/dashboard/" class="nav-link">Dashboard</a>
            <a href="#" class="nav-link">Quests</a>
            <a href="#" class="nav-link">Regions</a>
            <a href="/leaderboard/" class="nav-link">Leaderboard</a>
        </div>
        <div class="navbar-right">
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:logout' %}" class="btn-logout">Logout</a>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="nav-link">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
